<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rackteon Blog</title>
<link rel="icon" type="image/png" href="Screenshot 2026-04-06 at 20.54.45.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
/* Base Styles matching the homepage */
:root {
  --teal: #00F5C4;
  --cyan: #00C4FF;
  --dark: #111314;
  --dark2: #1a1d1f;
  --dark3: #242729;
  --card: #1e2124;
  --border: rgba(255,255,255,0.08);
  --text: #f0f2f4;
  --muted: #8a9099;
  --grad: linear-gradient(135deg, #00F5C4, #00C4FF);
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--dark); color: var(--text); font-family: 'Inter', sans-serif; font-size: 16px; line-height: 1.6; }
h1,h2,h3,h4,h5 { font-family: 'Manrope', sans-serif; line-height: 1.2; }
a { color: inherit; text-decoration: none; }

/* Navbar */
nav { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 0 5%; height: 75px; background: rgba(17,19,20,0.85); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); }
.brand-logo { display: flex; align-items: center; gap: 10px; cursor: pointer; transition: all 0.3s ease; }
.brand-icon { width: 40px; height: 40px; flex-shrink: 0; }
.brand-text { display: flex; flex-direction: column; justify-content: center; align-items: center; }
.brand-title { font-family: 'Manrope', sans-serif; font-weight: 800; font-size: 1.8rem; color: var(--text); line-height: 1; letter-spacing: 1px; display: flex; align-items: baseline; }
.brand-dot { color: var(--teal); font-size: 1.8rem; line-height: 1; }
.brand-subtitle { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 0.68rem; color: var(--teal); letter-spacing: 4px; text-transform: uppercase; margin-top: 4px; margin-left: 4px; }
.nav-links { display: flex; align-items: center; gap: 8px; list-style: none; }
.nav-links a { padding: 8px 14px; border-radius: 8px; font-size: .9rem; font-weight: 500; color: var(--muted); transition: all .2s; }
.nav-links a:hover { color: var(--text); background: rgba(255,255,255,0.07); }

/* Main Blog Reader Layout */
.article-header { padding: 160px 5% 60px; text-align: center; max-width: 900px; margin: 0 auto; border-bottom: 1px solid var(--border); }
.article-title { font-size: clamp(2.2rem, 5vw, 3.5rem); font-weight: 800; margin-bottom: 20px; line-height: 1.1; }
.article-meta { display: flex; justify-content: center; gap: 15px; color: var(--muted); font-size: 0.9rem; margin-bottom: 20px; }
.article-tags { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
.blog-tag { padding: 4px 12px; border-radius: 100px; font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; background: rgba(0,245,196,0.1); border: 1px solid rgba(0,245,196,0.2); color: var(--teal); }

/* Markdown Content Styling */
.article-content { max-width: 800px; margin: 0 auto; padding: 60px 5% 100px; font-size: 1.1rem; color: #d1d5db; line-height: 1.8; }
.article-content h1, .article-content h2, .article-content h3 { color: #fff; margin-top: 40px; margin-bottom: 16px; font-weight: 700; }
.article-content p { margin-bottom: 20px; }
.article-content a { color: var(--cyan); text-decoration: underline; }
.article-content ul, .article-content ol { margin-bottom: 20px; padding-left: 20px; }
.article-content li { margin-bottom: 8px; }
.article-content blockquote { border-left: 4px solid var(--teal); background: var(--dark2); padding: 16px 20px; border-radius: 0 8px 8px 0; font-style: italic; margin-bottom: 24px; }
.article-content pre { background: var(--dark3); padding: 20px; border-radius: 10px; overflow-x: auto; margin-bottom: 24px; border: 1px solid var(--border); }
.article-content code { font-family: monospace; background: var(--dark3); padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }

/* Dynamic Image Handling */
.article-content img {
  max-width: 100%;
  height: auto;
  border-radius: 12px;
  margin: 30px 0;
  border: 1px solid var(--border);
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  display: block;
}

/* Footer */
footer { background: var(--dark2); border-top: 1px solid var(--border); padding: 60px 5% 30px; }
.footer-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 40px; margin-bottom: 48px; max-width: 1200px; margin: 0 auto; }
.footer-desc { font-size: .88rem; color: var(--muted); line-height: 1.7; max-width: 280px; margin-bottom: 24px; margin-top: 16px; }
.social-links { display: flex; gap: 12px; }
.social-link { width: 40px; height: 40px; border-radius: 10px; background: var(--dark3); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; transition: all .2s; color: var(--text); text-decoration: none;}
.social-link:hover { border-color: var(--teal); color: var(--teal); transform: translateY(-2px); }
.footer-col h4 { font-family: 'Manrope', sans-serif; font-weight: 700; font-size: .92rem; margin-bottom: 16px; }
.footer-col ul { list-style: none; display: flex; flex-direction: column; gap: 10px; }
.footer-col ul li a { font-size: .87rem; color: var(--muted); transition: color .2s; }
.footer-col ul li a:hover { color: var(--teal); }
.footer-contact { display: flex; flex-direction: column; gap: 10px; }
.contact-row { display: flex; align-items: center; gap: 10px; font-size: .87rem; color: var(--muted); }
.contact-row .ico { color: var(--teal); }
.footer-bottom { max-width: 1200px; margin: 0 auto; border-top: 1px solid var(--border); padding-top: 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; font-size: .83rem; color: var(--muted); }

/* Loader */
#loader { text-align: center; padding: 100px; color: var(--teal); font-size: 1.5rem; }

@media (max-width: 768px) {
  .brand-logo { gap: 6px; }
  .brand-icon { width: 30px; height: 30px; }
  .brand-title { font-size: 1.3rem; }
  .brand-dot { font-size: 1.3rem; }
  .brand-subtitle { font-size: 0.55rem; }
  .footer-grid { grid-template-columns: 1fr; }
  .article-title { font-size: 2rem; }
}
</style>
</head>
<body>

<nav>
  <a href="/index.html" class="brand-logo">
    <svg class="brand-icon" width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <g transform="skewX(-15) translate(8, 2)">
        <rect x="0" y="0" width="16" height="14" rx="2" fill="#00F5C4"/>
        <rect x="18" y="4" width="10" height="10" rx="2" fill="#00E0B0"/>
        <rect x="-4" y="16" width="10" height="10" rx="2" fill="#00C4FF"/>
        <rect x="8" y="16" width="16" height="14" rx="2" fill="#00C4FF"/>
      </g>
    </svg>
    <div class="brand-text">
      <div class="brand-title">RACKTEON<span class="brand-dot">.</span></div>
      <div class="brand-subtitle">NETWORKS</div>
    </div>
  </a>
  <ul class="nav-links">
    <li><a href="/index.html">&larr; Back to Home</a></li>
  </ul>
</nav>

<div id="loader">Loading Article...</div>

<div id="blog-wrapper" style="display: none;">
  <header class="article-header">
    <div class="article-tags" id="postTags"></div>
    <h1 class="article-title" id="postTitle"></h1>
    <div class="article-meta">
      <span id="postAuthor"></span> | <span id="postDate"></span>
    </div>
  </header>

  <main class="article-content" id="postContent">
    </main>
</div>

<footer>
  <div class="container">
    <div class="footer-grid">
      <div class="footer-brand">
        <a href="/index.html" class="brand-logo" style="margin-bottom: 16px;">
          <svg class="brand-icon" width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <g transform="skewX(-15) translate(8, 2)">
              <rect x="0" y="0" width="16" height="14" rx="2" fill="#00F5C4"/>
              <rect x="18" y="4" width="10" height="10" rx="2" fill="#00E0B0"/>
              <rect x="-4" y="16" width="10" height="10" rx="2" fill="#00C4FF"/>
              <rect x="8" y="16" width="16" height="14" rx="2" fill="#00C4FF"/>
            </g>
          </svg>
          <div class="brand-text">
            <div class="brand-title">RACKTEON<span class="brand-dot">.</span></div>
            <div class="brand-subtitle">NETWORKS</div>
          </div>
        </a>
        <p class="footer-desc">Where Learning Meets Hiring. Affordable, job-ready networking training for students across India and the world.</p>
        
        <div class="social-links">
          <a href="https://chat.whatsapp.com/DAzybbHNMWq7pdWsOKtUwc?mode=r_t" target="_blank" class="social-link"><i class="fab fa-whatsapp"></i></a>
          <a href="https://www.linkedin.com/company/rackteon-networks/?viewAsMember=true" target="_blank" class="social-link"><i class="fab fa-linkedin-in"></i></a>
          <a href="https://www.youtube.com/@RackteonNetworks" target="_blank" class="social-link"><i class="fab fa-youtube"></i></a>
          <a href="https://www.instagram.com/rackteonnetworks/" target="_blank" class="social-link"><i class="fab fa-instagram"></i></a>
        </div>
      </div>
    </div>
    <div class="footer-bottom">
      <span>© 2026 Rackteon Networks. All rights reserved.</span>
    </div>
  </div>
</footer>

<script>
// 1. Get the Blog ID from the URL (e.g., blog-post.html?id=0)
const urlParams = new URLSearchParams(window.location.search);
const postId = urlParams.get('id');

// 2. Fetch the blogs database
fetch('/blogs.json')
  .then(response => response.json())
  .then(data => {
    // 3. Find the specific post
    const post = data.items[postId];
    
    if (!post) {
      document.getElementById('loader').innerText = "Post not found. Please return to the homepage.";
      return;
    }

    // 4. Fill in the Headers
    document.getElementById('postTitle').innerText = post.title;
    
    const dateObj = new Date(post.date);
    document.getElementById('postDate').innerText = dateObj.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    
    // Fallback if author is blank
    document.getElementById('postAuthor').innerText = post.author ? `By ${post.author}` : "By Rackteon Team";

    // 5. Fill in the Tags
    if (post.tags) {
      let tagsHtml = '';
      post.tags.split(',').forEach(tag => {
        tagsHtml += `<span class="blog-tag">${tag.trim()}</span>`;
      });
      document.getElementById('postTags').innerHTML = tagsHtml;
    }

    // 6. Convert Markdown to HTML (Images will render automatically!)
    document.getElementById('postContent').innerHTML = marked.parse(post.body);

    // Show the blog, hide the loader
    document.getElementById('loader').style.display = 'none';
    document.getElementById('blog-wrapper').style.display = 'block';
  })
  .catch(err => {
    document.getElementById('loader').innerText = "Error loading post. Please try again later.";
    console.error(err);
  });
</script>

</body>
</html>
